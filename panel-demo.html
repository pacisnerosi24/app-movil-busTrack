<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusTrack · Panel de prueba</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --border:#334155; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    header h1 { font-size:18px; margin:0; }
    .pill { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--border); color:var(--muted); }
    .pill.on { color:var(--ok); border-color:var(--ok); }
    .pill.off { color:var(--bad); border-color:var(--bad); }
    .layout { display:grid; grid-template-columns: 360px 1fr; gap:16px; padding:16px; }
    @media (max-width:820px){ .layout{ grid-template-columns:1fr; } #map{ height:340px; } }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:14px; }
    .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 10px; }
    label { font-size:12px; color:var(--muted); display:block; margin:8px 0 3px; }
    input, select { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:#0b1220; color:var(--text); font-size:14px; }
    button { cursor:pointer; border:none; border-radius:8px; padding:9px 12px; font-size:13px; font-weight:600; background:var(--accent); color:#04263a; margin-top:10px; width:100%; }
    button.ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
    button.danger { background:var(--bad); color:#fff; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .row { display:flex; gap:8px; }
    .row > * { flex:1; }
    #map { height: calc(100vh - 120px); min-height:400px; border-radius:12px; border:1px solid var(--border); }
    .log { font-family: ui-monospace, monospace; font-size:11px; background:#0b1220; border:1px solid var(--border); border-radius:8px; padding:8px; height:150px; overflow:auto; white-space:pre-wrap; line-height:1.5; }
    .log .ok{color:var(--ok)} .log .bad{color:var(--bad)} .log .info{color:var(--accent)} .log .warn{color:var(--warn)}
    .hint { font-size:11px; color:var(--muted); margin-top:6px; }
    .stat { display:flex; justify-content:space-between; font-size:13px; padding:3px 0; }
    .stat b { color:var(--accent); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <header>
    <h1>🚌 BusTrack · Panel de prueba</h1>
    <span id="apiPill" class="pill">API: ?</span>
    <span id="wsPill" class="pill">WebSocket: ?</span>
    <span id="authPill" class="pill">Sin sesión</span>
    <input id="apiBase" value="http://localhost:3000" style="width:220px;margin-left:auto" />
  </header>

  <div class="layout">
    <div>
      <!-- 1. AUTH -->
      <div class="card">
        <h2>1 · Autenticación (JWT)</h2>
        <label>Email</label>
        <input id="email" value="conductor1@bustrack.com" />
        <label>Contraseña</label>
        <input id="password" value="Test1234!" />
        <label>Rol (para registro)</label>
        <select id="rol">
          <option value="conductor">conductor</option>
          <option value="pasajero">pasajero</option>
          <option value="administrador">administrador</option>
        </select>
        <div class="row">
          <button class="ghost" onclick="registrar()">Registrar</button>
          <button onclick="login()">Login</button>
        </div>
        <div class="hint">El login guarda el token y lo usa en las siguientes llamadas.</div>
      </div>

      <!-- 2. SIMULADOR BUS -->
      <div class="card">
        <h2>2 · Simulador de bus (conductor)</h2>
        <label>ID del bus</label>
        <input id="idBus" value="BUS-001" />
        <div class="stat"><span>Última posición enviada</span><b id="lastPos">—</b></div>
        <div class="row">
          <button id="btnStart" onclick="startSim()">▶ Iniciar recorrido</button>
          <button id="btnStop" class="ghost" onclick="stopSim()" disabled>⏹ Detener</button>
        </div>
        <div class="hint">Envía una nueva ubicación GPS cada 2 s (POST /api/gps/ubicacion).</div>
      </div>

      <!-- 3. EMERGENCIA -->
      <div class="card">
        <h2>3 · Emergencia</h2>
        <label>Tipo</label>
        <select id="tipoAlerta">
          <option value="PANICO_MANUAL">PANICO_MANUAL (botón de pánico)</option>
          <option value="IA_ACUSTICO">IA_ACUSTICO (ruido detectado)</option>
        </select>
        <label>Decibeles (para IA_ACUSTICO; &gt;90 = crítico)</label>
        <input id="decibeles" type="number" value="120" />
        <button class="danger" onclick="alerta()">🚨 Disparar alerta</button>
      </div>

      <div class="card">
        <h2>Consola</h2>
        <div id="log" class="log"></div>
      </div>
    </div>

    <div>
      <div id="map"></div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const api = () => $('apiBase').value.replace(/\/$/,'');
let token = null, simTimer = null, socket = null;
let lat = -2.170998, lng = -79.922359; // Guayaquil, EC (punto de partida)
let marker, trail;

// ---------- log ----------
function log(msg, cls='') {
  const el = $('log');
  const t = new Date().toLocaleTimeString();
  el.innerHTML += `<span class="${cls}">[${t}] ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

// ---------- mapa ----------
const map = L.map('map').setView([lat, lng], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap', maxZoom:19
}).addTo(map);
const busIcon = L.divIcon({ html:'🚌', className:'', iconSize:[30,30], iconAnchor:[15,15] });
marker = L.marker([lat,lng], {icon:busIcon}).addTo(map).bindPopup('Esperando datos…');
trail = L.polyline([], { color:'#38bdf8', weight:3, opacity:.7 }).addTo(map);

// ---------- health check ----------
async function checkApi() {
  try {
    // /api/auth/login sin body -> responde (400/401), pero prueba que el server está vivo
    const r = await fetch(api()+'/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    $('apiPill').textContent = 'API: OK'; $('apiPill').className='pill on';
  } catch(e) {
    $('apiPill').textContent = 'API: caída'; $('apiPill').className='pill off';
    log('No se pudo contactar la API en '+api()+' — ¿está corriendo?', 'bad');
  }
}

// ---------- auth ----------
async function registrar() {
  const body = { email:$('email').value, password:$('password').value, rol:$('rol').value };
  try {
    const r = await fetch(api()+'/api/auth/registro', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const d = await r.json();
    if (r.ok) log('✔ Registrado: '+d.usuario.email+' ('+d.usuario.rol+')', 'ok');
    else log('✖ Registro: '+JSON.stringify(d.message||d), 'bad');
  } catch(e){ log('✖ Error de red en registro: '+e.message, 'bad'); }
}
async function login() {
  const body = { email:$('email').value, password:$('password').value };
  try {
    const r = await fetch(api()+'/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const d = await r.json();
    if (r.ok) {
      token = d.token;
      $('authPill').textContent = 'Sesión: '+d.usuario.email; $('authPill').className='pill on';
      log('✔ Login OK. Token guardado.', 'ok');
    } else log('✖ Login: '+JSON.stringify(d.message||d), 'bad');
  } catch(e){ log('✖ Error de red en login: '+e.message, 'bad'); }
}

// ---------- websocket (pasajero que ve el bus) ----------
function connectWs() {
  if (socket) return;
  socket = io(api(), { transports:['websocket','polling'] });
  socket.on('connect', () => { $('wsPill').textContent='WebSocket: conectado'; $('wsPill').className='pill on'; log('✔ WebSocket conectado ('+socket.id+')','ok'); subscribe(); });
  socket.on('disconnect', () => { $('wsPill').textContent='WebSocket: desconectado'; $('wsPill').className='pill off'; });
  socket.on('connect_error', e => log('WS error: '+e.message,'bad'));
}
let subscribedEvent = null;
function subscribe() {
  const ev = 'bus_'+$('idBus').value;
  if (subscribedEvent) socket.off(subscribedEvent);
  subscribedEvent = ev;
  socket.on(ev, payload => {
    log('📡 EN VIVO ← '+ev+': ('+payload.latitud.toFixed(5)+', '+payload.longitud.toFixed(5)+')','info');
    moveMarker(payload.latitud, payload.longitud, true);
  });
  log('Escuchando evento en vivo: '+ev, 'warn');
}

// ---------- mover marcador ----------
function moveMarker(la, ln, live) {
  marker.setLatLng([la, ln]);
  marker.getPopup().setContent('🚌 '+$('idBus').value+'<br>'+la.toFixed(5)+', '+ln.toFixed(5)+(live?'<br><b>(tiempo real)</b>':''));
  trail.addLatLng([la, ln]);
  map.panTo([la, ln]);
}

// ---------- simulador ----------
async function sendLocation() {
  if (!token) { log('⚠ Necesitas hacer Login primero (los endpoints GPS están protegidos con JWT).','warn'); stopSim(); return; }
  // movimiento aleatorio suave (como si el bus avanzara por la ciudad)
  lat += (Math.random()-0.35)*0.0009;
  lng += (Math.random()-0.35)*0.0009;
  const body = { idBus:$('idBus').value, latitud:lat, longitud:lng };
  try {
    const r = await fetch(api()+'/api/gps/ubicacion', {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify(body)});
    if (r.ok) { $('lastPos').textContent = lat.toFixed(5)+', '+lng.toFixed(5); }
    else { const d=await r.json(); log('✖ GPS '+r.status+': '+JSON.stringify(d.message||d),'bad'); if(r.status===401) stopSim(); }
  } catch(e){ log('✖ Error de red GPS: '+e.message,'bad'); }
}
function startSim() {
  if (!token) { log('⚠ Haz Login primero.','warn'); return; }
  connectWs(); subscribe();
  $('btnStart').disabled=true; $('btnStop').disabled=false;
  log('▶ Recorrido iniciado para '+$('idBus').value,'ok');
  sendLocation();
  simTimer = setInterval(sendLocation, 2000);
}
function stopSim() {
  clearInterval(simTimer); simTimer=null;
  $('btnStart').disabled=false; $('btnStop').disabled=true;
  log('⏹ Recorrido detenido','warn');
}

// ---------- alerta ----------
async function alerta() {
  if (!token) { log('⚠ Haz Login primero (endpoint protegido).','warn'); return; }
  const body = { idBus:$('idBus').value, tipo:$('tipoAlerta').value, decibeles:Number($('decibeles').value) };
  try {
    const r = await fetch(api()+'/api/emergencias/alerta', {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify(body)});
    const d = await r.json();
    if (r.ok) log((d.esCritica?'🚨 ':'✔ ')+d.mensaje+' (id '+d.alertaId.slice(0,8)+'…)', d.esCritica?'bad':'ok');
    else log('✖ Alerta: '+JSON.stringify(d.message||d),'bad');
  } catch(e){ log('✖ Error de red alerta: '+e.message,'bad'); }
}

// init
checkApi();
connectWs();
log('Panel listo. Paso 1: Login. Paso 2: ▶ Iniciar recorrido y mira el bus moverse.','info');
</script>
</body>
</html>
