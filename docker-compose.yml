name: transporte-app

services:
  # 1. Base de datos PostgreSQL
  postgres_db:
    image: postgres:15-alpine
    container_name: transporte_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecreto
      POSTGRES_DB: transporte_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Base de datos MongoDB
  mongo_db:
    image: mongo:6
    container_name: transporte_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 3. Base de datos Vectorial Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    restart: unless-stopped
    ports:
      - "6333:6333" 
      - "6334:6334" 
    environment:
      - QDRANT__SERVICE__API_KEY=663baaf114e04098a0b44a623843255c0b5b2d652de9e60d2bdb4e1acb4bc079
    volumes:
      - qdrant_storage:/qdrant/storage

  # 4. MICROSERVICIO IA (NUEVO)
  servicio_ia:
    build:
      # Navegamos hacia atrás una carpeta y entramos al microservicio
      context: ../servicio-ai-deteccion-sonidos
      dockerfile: Dockerfile
    container_name: ia_deteccion_sonidos
    ports:
      - "8000:8000"
    environment:
      - PUERTO_API=8000
      # Magia de Docker: Se conecta a Qdrant por el nombre del contenedor, no por localhost
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=663baaf114e04098a0b44a623843255c0b5b2d652de9e60d2bdb4e1acb4bc079
      - UMBRAL_CONFIANZA=75.0
    volumes:
      # MAGIA: Conecta tu carpeta de Windows con la carpeta /app/audios_base dentro de Linux en tiempo real
      - ../servicio-ai-deteccion-sonidos/audios_base:/app/audios_base
    depends_on:
      - qdrant # Espera a que Qdrant esté listo antes de encender la IA

  # 5. Tu Monolito en NestJS
  backend_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transporte_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecreto
      - POSTGRES_DB=transporte_db
      - MONGO_URI=mongodb://mongo_db:27017/telemetria_db
      - JWT_SECRET=1829e7c94cb6595c362d6c632868b952e0dd1b7e25b9a6bdf36fdffe9ab0bbbc
      - JWT_EXPIRACION=8h
      # Añadimos la URL interna de la IA para que NestJS sepa dónde enviarle los audios
      - URL_MICROSERVICIO_IA=http://servicio_ia:8000 
    depends_on:
      - postgres_db
      - mongo_db
      - qdrant
      - servicio_ia

volumes:
  postgres_data:
  mongo_data:
  qdrant_storage:
    driver: local