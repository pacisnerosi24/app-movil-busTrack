services:
  postgresql:
    image: postgres:16
    container_name: postgresql-movil
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: postgresmovil
      # Debe coincidir con POSTGRES_DB del .env (la app se conecta a "app-movil")
      POSTGRES_DB: app-movil
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongo:
    image: mongo
    container_name: mongo-db-app-movil
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mongopablomovil
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
